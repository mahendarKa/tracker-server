[phases.setup]
nixPkgs = ["jdk21"]

[phases.install]
cmds = ["./mvnw clean package -DskipTests"]

[phases.start]
cmd = "java -jar target/tracker-backend-*.jar"

[build.env]
TIDB_URL = "$TIDB_URL"
TIDB_USER = "$TIDB_USER"
TIDB_PASSWORD = "$TIDB_PASSWORD"
JWT_SECRET = "$JWT_SECRET"
JWT_EXPIRE = "$JWT_EXPIRE"
PORT = "$PORT"